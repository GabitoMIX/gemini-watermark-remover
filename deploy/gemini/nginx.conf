server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  add_header X-GWR-Build-Locale "es" always;
  add_header Cache-Control "no-store" always;

  location = /build-info.json {
    default_type application/json;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
